name: Test Suite Execution

# ───────────────────────────────────────────────────────────────────
# UniQuery CI/CD — Quality Gate
# 
# Runs on every Pull Request to enforce:
# - All tests must pass
# - Code coverage must meet SDD thresholds (80% stmt / 75% branch)
# - Both frontend and backend must pass independently
# ───────────────────────────────────────────────────────────────────

on: [pull_request]

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────
  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        run: npm run test:coverage
        # This will fail the build if coverage falls below 80%/75%

  # ─── Frontend Tests ──────────────────────────────────────────────
  frontend-tests:
    name: Frontend Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        run: npm run test:coverage
        # This will fail the build if coverage falls below 80%/75%

  # ─── Quality Gate Summary ────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - name: All Quality Checks Passed
        run: echo "✅ All test suites passed with required coverage thresholds."
