name: Test Suite Execution

# ───────────────────────────────────────────────────────────────────
# UniQuery CI/CD — Quality Gate
# 
# Runs on every Pull Request to enforce:
# - All tests must pass
# - Code coverage must meet SDD thresholds (80% stmt / 75% branch)
# - Both frontend and backend must pass independently
# ───────────────────────────────────────────────────────────────────

on: [pull_request]

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────
  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        run: npm run test:coverage
        # This will fail the build if coverage falls below 80%/75%

  # ─── Integration Tests (real routes via supertest + test DB) ─────
  integration-tests:
    name: Integration Test Suite
    runs-on: ubuntu-latest
    needs: [backend-tests]
    defaults:
      run: { working-directory: ./server }
    env:
      APPLICATION_DATABASE_URL_TEST: ${{ secrets.APPLICATION_DATABASE_URL_TEST }}
      JWT_SECRET:                    ${{ secrets.JWT_SECRET_TEST }}
      ANONYMITY_MASTER_KEY:          ${{ secrets.ANONYMITY_MASTER_KEY_TEST }}
      ANONYMITY_TENANT_SALT:         ${{ secrets.ANONYMITY_TENANT_SALT_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm', cache-dependency-path: server/package-lock.json }
      - run: npm ci
      # jest 30 renamed --testPathPattern to --testPathPatterns. The integration suites
      # self-skip (exit 0) when APPLICATION_DATABASE_URL_TEST is absent.
      - run: npm test -- --testPathPatterns=integration

  # ─── Frontend Tests ──────────────────────────────────────────────
  frontend-tests:
    name: Frontend Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        run: npm run test:coverage
        # This will fail the build if coverage falls below 80%/75%

  # ─── Quality Gate Summary ────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, integration-tests, frontend-tests]
    steps:
      - name: All Quality Checks Passed
        run: echo "✅ All test suites passed with required coverage thresholds."
